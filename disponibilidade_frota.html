<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disponibilidade da Frota — Loc Frotas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#101A30;
    --bg-card:#182648;
    --bg-card-hover:#1E2E56;
    --border-line:#26325A;
    --text-primary:#F4F6FA;
    --text-secondary:#8B95A8;
    --text-muted:#5C6580;
    --accent:#F5A623;
    --otimo:#5DCAA5;
    --otimo-bg:rgba(93,202,165,0.14);
    --bom:#F2D63D;
    --bom-bg:rgba(242,214,61,0.14);
    --atencao:#EF9F27;
    --atencao-bg:rgba(239,159,39,0.14);
    --critico:#E24B4A;
    --critico-bg:rgba(226,75,74,0.14);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background:var(--bg-page);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:32px 24px 64px;
  }

  .wrap{max-width:1180px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:20px;
  }

  .title-block{display:flex;align-items:center;gap:14px;}
  .logo-img{width:48px;height:48px;border-radius:11px;flex-shrink:0;}

  .title-block h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:26px;
    letter-spacing:0.3px;
    text-transform:uppercase;
    color:var(--accent);
  }

  .title-block p{color:var(--text-secondary);font-size:13px;margin-top:4px;}

  .header-meta{text-align:right;font-size:13px;color:var(--text-secondary);}
  .header-meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--otimo);margin-right:6px;}
  .header-meta .dot.stale{background:var(--critico);}

  #refresh-btn{
    margin-top:6px;
    background:transparent;
    border:1px solid var(--border-line);
    color:var(--text-primary);
    font-size:12px;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  #refresh-btn:hover{background:var(--bg-card-hover);}

  .road-stripe{
    height:3px;
    background-image:repeating-linear-gradient(90deg,var(--accent) 0 24px, transparent 24px 44px);
    margin:20px 0 24px;
    opacity:0.9;
  }

  .kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    margin-bottom:24px;
  }

  .kpi-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:6px;
    padding:16px 18px;
    border-left:3px solid var(--accent);
  }

  .kpi-label{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .kpi-value{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;}
  .kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}

  .chart-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:8px;
    padding:20px;
    margin-bottom:24px;
  }

  .chart-card h2{
    font-family:'Oswald',sans-serif;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.3px;
    color:var(--text-secondary);
    margin-bottom:16px;
  }

  .chart-legend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);}
  .chart-legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .table-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:8px;
    overflow-x:auto;
  }

  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}

  thead th{
    text-align:left;
    padding:10px 16px;
    background:#1B2A50;
    color:var(--text-secondary);
    font-weight:500;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:0.4px;
    white-space:nowrap;
    border-bottom:1px solid var(--border-line);
  }

  tbody td{
    padding:9px 16px;
    border-bottom:1px solid var(--border-line);
    white-space:nowrap;
  }

  tbody tr:hover{background:var(--bg-card-hover);}

  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:10px;
    text-transform:uppercase;
    letter-spacing:0.3px;
  }
  .badge.otimo{background:var(--otimo-bg);color:var(--otimo);}
  .badge.bom{background:var(--bom-bg);color:var(--bom);}
  .badge.atencao{background:var(--atencao-bg);color:var(--atencao);}
  .badge.critico{background:var(--critico-bg);color:var(--critico);}

  .empty-state, .error-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
  .error-state{color:var(--critico);}

  footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text-muted);}

  @media (max-width:640px){
    .title-block h1{font-size:20px;}
    .header-meta{text-align:left;}
    header{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>

<script>
  /* =========================================================
     CONFIGURACAO — cole aqui a URL do CSV publicado no Google
     Sheets (Arquivo > Compartilhar > Publicar na web > escolha
     a aba > formato CSV), com colunas:
     MES, DATA, TOTAL FROTA, PARADOS, ATIVOS,
     DISPONIBILIDADE (%), STATUS, META (%)
     ========================================================= */
  const CSV_URL = "COLE_AQUI_O_LINK_DO_CSV_PUBLICADO";

  const REFRESH_MS = 5 * 60 * 1000;
  let rawRows = [];
  let headers = [];

  function parseCSV(text){
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for(let i=0;i<text.length;i++){
      const c = text[i], next = text[i+1];
      if(inQuotes){
        if(c === '"' && next === '"'){ field += '"'; i++; }
        else if(c === '"'){ inQuotes = false; }
        else { field += c; }
      } else {
        if(c === '"'){ inQuotes = true; }
        else if(c === ','){ row.push(field); field = ""; }
        else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
        else if(c === '\r'){ /* skip */ }
        else { field += c; }
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.some(v => v.trim() !== ""));
  }

  function findColumn(names){
    return headers.find(h => names.some(n => h.toLowerCase().includes(n)));
  }

  function statusFromPct(pct){
    if(pct >= 97) return "otimo";
    if(pct >= 95) return "bom";
    if(pct >= 90) return "atencao";
    return "critico";
  }

  function statusLabel(s){
    return { otimo:"Ótimo", bom:"Bom", atencao:"Atenção", critico:"Crítico" }[s] || s;
  }

  function getRows(){
    const mesCol = findColumn(["mes","mês"]);
    const dataCol = findColumn(["data"]);
    const totalCol = findColumn(["total frota","total"]);
    const paradosCol = findColumn(["parados"]);
    const ativosCol = findColumn(["ativos"]);
    const dispCol = findColumn(["disponibilidade","disponib"]);
    const metaCol = findColumn(["meta"]);

    let rows = rawRows.map(r => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = r[i] ?? "");
      const pct = parseFloat(String(obj[dispCol]).replace(",", "."));
      obj.__pct = pct;
      obj.__status = statusFromPct(pct);
      obj.__mes = mesCol ? obj[mesCol] : "";
      obj.__data = dataCol ? obj[dataCol] : "";
      obj.__total = totalCol ? obj[totalCol] : "";
      obj.__parados = paradosCol ? obj[paradosCol] : "";
      obj.__ativos = ativosCol ? obj[ativosCol] : "";
      obj.__meta = metaCol ? parseFloat(String(obj[metaCol]).replace(",",".")) : null;
      return obj;
    }).filter(r => !isNaN(r.__pct));

    return rows;
  }

  function render(){
    const rows = getRows();
    renderKPIs(rows);
    renderChart(rows);
    renderTable(rows);
  }

  function renderKPIs(rows){
    const strip = document.getElementById("kpi-strip");
    if(!rows.length){
      strip.innerHTML = "";
      return;
    }
    const avg = rows.reduce((s,r) => s + r.__pct, 0) / rows.length;
    const best = rows.reduce((a,b) => a.__pct > b.__pct ? a : b);
    const worst = rows.reduce((a,b) => a.__pct < b.__pct ? a : b);
    const meta = rows[0].__meta || 97;
    const daysAboveMeta = rows.filter(r => r.__pct >= meta).length;

    strip.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Disponibilidade média</div>
        <div class="kpi-value">${avg.toFixed(2)}%</div>
        <div class="kpi-sub">Meta: ${meta}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Melhor dia</div>
        <div class="kpi-value">${best.__pct.toFixed(2)}%</div>
        <div class="kpi-sub">${best.__data}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Pior dia</div>
        <div class="kpi-value">${worst.__pct.toFixed(2)}%</div>
        <div class="kpi-sub">${worst.__data}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Dias acima da meta</div>
        <div class="kpi-value">${daysAboveMeta}</div>
        <div class="kpi-sub">de ${rows.length} dias</div>
      </div>
    `;
  }

  function renderChart(rows){
    const container = document.getElementById("chart-container");
    if(!rows.length){
      container.innerHTML = '<div class="empty-state">Sem dados para exibir.</div>';
      return;
    }

    const width = 1100, height = 260, padL = 40, padR = 10, padT = 10, padB = 30;
    const innerW = width - padL - padR;
    const innerH = height - padT - padB;

    const values = rows.map(r => r.__pct);
    let yMin = Math.floor(Math.min(...values, 88) / 5) * 5;
    let yMax = 100;

    const xStep = rows.length > 1 ? innerW / (rows.length - 1) : 0;
    const yScale = v => padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
    const xScale = i => padL + i * xStep;

    const meta = rows[0].__meta || 97;
    const metaY = yScale(meta);

    let path = rows.map((r,i) => `${i===0?'M':'L'} ${xScale(i).toFixed(1)} ${yScale(r.__pct).toFixed(1)}`).join(" ");

    const colorMap = { otimo:"var(--otimo)", bom:"var(--bom)", atencao:"var(--atencao)", critico:"var(--critico)" };

    let dots = rows.map((r,i) => {
      const cx = xScale(i).toFixed(1), cy = yScale(r.__pct).toFixed(1);
      return `<circle cx="${cx}" cy="${cy}" r="3" fill="${colorMap[r.__status]}"><title>${r.__data}: ${r.__pct.toFixed(2)}%</title></circle>`;
    }).join("");

    let yLabels = "";
    for(let v = yMin; v <= yMax; v += 5){
      const y = yScale(v);
      yLabels += `<text x="4" y="${y+4}" font-size="10" fill="var(--text-muted)">${v}%</text>`;
      yLabels += `<line x1="${padL}" y1="${y}" x2="${width-padR}" y2="${y}" stroke="var(--border-line)" stroke-width="1"/>`;
    }

    const labelEvery = Math.ceil(rows.length / 10);
    let xLabels = "";
    rows.forEach((r,i) => {
      if(i % labelEvery === 0 || i === rows.length-1){
        xLabels += `<text x="${xScale(i).toFixed(1)}" y="${height-8}" font-size="9" fill="var(--text-muted)" text-anchor="middle">${r.__data.slice(0,5)}</text>`;
      }
    });

    const svg = `
      <svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto;">
        ${yLabels}
        <line x1="${padL}" y1="${metaY}" x2="${width-padR}" y2="${metaY}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5,4"/>
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.55"/>
        ${dots}
        ${xLabels}
      </svg>
    `;
    container.innerHTML = svg;
  }

  function renderTable(rows){
    const container = document.getElementById("table-container");
    if(!rows.length){
      container.innerHTML = '<div class="empty-state">Nenhum registro encontrado.</div>';
      return;
    }

    let thead = `<thead><tr>
      <th>Data</th><th>Total frota</th><th>Parados</th><th>Ativos</th><th>Disponibilidade</th><th>Status</th>
    </tr></thead>`;

    let tbody = "<tbody>";
    rows.slice().reverse().forEach(r => {
      tbody += `<tr>
        <td>${r.__data}</td>
        <td>${r.__total}</td>
        <td>${r.__parados}</td>
        <td>${r.__ativos}</td>
        <td>${r.__pct.toFixed(2)}%</td>
        <td><span class="badge ${r.__status}">${statusLabel(r.__status)}</span></td>
      </tr>`;
    });
    tbody += "</tbody>";

    container.innerHTML = `<table>${thead}${tbody}</table>`;
  }

  function setStatusDot(ok){
    document.getElementById("status-dot").className = ok ? "dot" : "dot stale";
  }

  async function loadData(){
    if(CSV_URL.includes("COLE_AQUI")){
      document.getElementById("table-container").innerHTML =
        '<div class="error-state">Configure a variável CSV_URL no início do arquivo com o link do seu Google Sheets publicado.</div>';
      document.getElementById("last-update").textContent = "Não configurado";
      setStatusDot(false);
      return;
    }
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now());
      if(!res.ok) throw new Error("Falha ao buscar CSV");
      const text = await res.text();
      const parsed = parseCSV(text);
      headers = parsed[0].map(h => h.trim());
      rawRows = parsed.slice(1);
      render();
      document.getElementById("last-update").textContent = "Atualizado às " + new Date().toLocaleTimeString('pt-BR');
      setStatusDot(true);
    } catch(err){
      document.getElementById("table-container").innerHTML =
        '<div class="error-state">Erro ao carregar dados. Verifique se o link do CSV está correto e publicado.</div>';
      document.getElementById("last-update").textContent = "Erro na última tentativa";
      setStatusDot(false);
    }
  }

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>
